name: Bug 报告 | Bug Report
description: 报告使用中遇到的 Bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的反馈！请先搜索是否已有类似 [Issue](https://github.com/mustcanbedo/yanling/issues)。
  - type: textarea
    id: describe
    attributes:
      label: 请描述这个 Bug
      description: 清晰简洁地描述 Bug 的表现
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 重现步骤
      description: 如何复现该问题
      placeholder: |
        1. 打开...
        2. 点击...
        3. 观察到...
    validations:
      required: false
  - type: input
    id: url
    attributes:
      label: 出现问题的网址
      description: 若与具体页面相关（如小红书笔记、B 站视频等），请粘贴完整链接
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: 扩展版本
      description: 扩展侧栏「驭灵」→「关于」中查看；侧载用户请注明是否来自 GitHub Release
      placeholder: 例如 0.1.0
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 补充说明
    validations:
      required: false
