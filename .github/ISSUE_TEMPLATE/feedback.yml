name: 意见反馈 | Feedback
description: 提交问题、建议或使用反馈
title: "言灵 Yanling 意见反馈"
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的反馈！请描述您遇到的问题或建议。
  - type: textarea
    id: describe
    attributes:
      label: 请描述您的问题或建议
      description: 请尽可能详细地描述，以便我们更好地帮助您
      placeholder: 请描述您的问题或建议...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 扩展版本
      description: 当前使用的言灵扩展版本号（可在驭灵 → 关于 中查看）
      placeholder: v1.0.0
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 补充说明
      description: 其他有助于我们理解问题的信息
    validations:
      required: false
